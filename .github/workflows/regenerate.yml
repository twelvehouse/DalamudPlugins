name: Regenerate pluginmaster.json

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency: regenerate

jobs:
  regenerate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate pluginmaster.json
        run: python generate_pluginmaster.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pluginmaster.json README.md
          git diff --cached --quiet || git commit -m "chore: regenerate pluginmaster.json" && git pull --rebase && git push
